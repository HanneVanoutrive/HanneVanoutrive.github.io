<!DOCTYPE html>
<html>
<head>
  <title>Knowledge Graph</title>
  <script src="https://unpkg.com/rdflib/dist/rdflib.min.js"></script>
</head>
<body>

<h1 id="title"></h1>
<div id="content"></div>

<script>
const store = $rdf.graph();
const fetcher = new $rdf.Fetcher(store);

const dataURL = "data.ttl";
const subject = window.location.hash;

fetcher.load(dataURL).then(() => {

  const s = $rdf.sym(dataURL + subject);

  const triples = store.statementsMatching(s, null, null);

  document.getElementById("title").innerText = subject.replace("#","");

  let html = "<ul>";
  triples.forEach(t => {
      html += `<li><b>${t.predicate.value}</b> → ${t.object.value}</li>`;
  });
  html += "</ul>";

  document.getElementById("content").innerHTML = html;

});
</script>

</body>
</html>
